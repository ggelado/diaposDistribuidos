name: Compile Slides and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: pandoc/extra:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install make
        run: apk add --no-cache make

      - name: Build Slides PDF
        run: make

      - name: Prepare deployment
        run: |
          mkdir -p deploy
          cp diapos.pdf deploy/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
